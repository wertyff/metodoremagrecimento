services:
  - type: web
    name: metodo-seca-rapido-14d
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: pedidos
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: PORT
        value: 10000
      - key: APP_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: BASE_URL
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: SUPPORT_EMAIL
        value: ""
      - key: SUPPORT_WHATSAPP
        value: ""
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADO_PAGO_STATEMENT_DESCRIPTOR
        value: SECARAPIDO
