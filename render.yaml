services:
  - type: web
    name: metodo-seca-rapido-14d
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: pedidos
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: PORT
        value: 10000
      - key: APP_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: BASE_URL
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: SUPPORT_EMAIL
        value: ""
      - key: SUPPORT_WHATSAPP
        value: ""
      - key: APP_NAME
        value: Match Intelligence
      - key: MOBILE_RESET_SCHEME
        value: matchintelligence://reset-password
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        value: false
      - key: PREMIUM_PLAN_CODE
        value: match_intelligence_pro
      - key: PREMIUM_PLAN_TITLE
        value: Match Intelligence PRO
      - key: PREMIUM_PLAN_DESCRIPTION
        value: Analises premium, mercados inteligentes, alertas VIP e comparativos avancados.
      - key: PREMIUM_PLAN_AMOUNT
        value: 29.90
      - key: PREMIUM_PLAN_CURRENCY
        value: BRL
      - key: PREMIUM_PLAN_FREQUENCY
        value: 1
      - key: PREMIUM_PLAN_FREQUENCY_TYPE
        value: months
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADO_PAGO_STATEMENT_DESCRIPTOR
        value: SECARAPIDO
      - key: SPORTS_PROVIDER
        value: api-football
      - key: API_FOOTBALL_KEY
        sync: false
      - key: API_FOOTBALL_BASE_URL
        value: https://v3.football.api-sports.io
      - key: SPORTSMONKS_TOKEN
        sync: false
      - key: SPORTSMONKS_BASE_URL
        value: https://api.sportmonks.com/v3/football
      - key: THESPORTSDB_BASE_URL
        value: https://www.thesportsdb.com/api/v1/json/123
